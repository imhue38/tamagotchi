<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi v7.1</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
  background:transparent;
  user-select:none;
}

#tama{
  width:190px;
  height:250px;
  background:linear-gradient(145deg,#ffe3f6,#e6f6ff);
  border-radius:58% 58% 52% 52%;
  padding:14px;
  transform:scale(0.85);
  box-shadow:0 10px 20px rgba(0,0,0,.12);
  position:relative;
}

/* LCD */
.screen{
  width:62%;
  height:118px;
  margin:24px auto 0;
  padding:10px;
  background:linear-gradient(145deg,#ffffff,#f7fbff);
  border-radius:10px;
  text-align:center;
  box-shadow:
    inset 5px 5px 10px rgba(0,0,0,.14),
    inset -3px -3px 8px rgba(255,255,255,.9),
    0 0 0 2px rgba(190,200,230,.25);
  position:relative;
  overflow:hidden;
}

/* UI */
.level,
#emotion,
#memory{
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

/* 電量 */
#battery{
  position:absolute;
  top:6px;
  right:8px;
  font-size:8px;
  font-weight:900;
  color:#87c1f5;
}

/* 寵物 */
.pet{
  font-size:22px;
  font-weight:900;
  color:#baa3d6;
  margin:6px 0;
}

/* =========================
   📊 三條血條（核心修復）
========================= */

.bar{
  width:85%;
  height:5px;
  margin:3px auto;
  border-radius:10px;
  overflow:hidden;
  background:#eee;
}

/* ❤️ HP */
.hpFill{
  height:100%;
  width:100%;
  background:#ff7aa2;
}

/* 🍖 Hunger */
.hungerFill{
  height:100%;
  width:0%;
  background:#f0c895;
}

/* 💓 Affection */
.affectionFill{
  height:100%;
  width:0%;
  background:#b7a6ff;
}

/* 選單 */
.menu{
  display:none;
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

.menu.active{
  display:block;
}

/* 按鍵 */
.buttons{
  position:absolute;
  top:178px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
}

.btn{
  width:28px;
  height:28px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#ffe3f6,#e6f6ff);
  font-weight:900;
  cursor:pointer;
}

.btn-center{
  width:34px;
  height:34px;
}
</style>
</head>

<body>

<div id="tama">

  <div class="screen">

    <div id="battery">100%</div>

    <div class="level" id="level">LV 1</div>

    <div class="pet" id="pet">꒰ ´꒳`∗ ꒱</div>

    <div id="memory">剛出生</div>
    <div id="emotion">心情：普通</div>

    <!-- ❤️ HP -->
    <div class="bar"><div class="hpFill" id="hpFill"></div></div>

    <!-- 🍖 Hunger -->
    <div class="bar"><div class="hungerFill" id="hungerFill"></div></div>

    <!-- 💓 Affection -->
    <div class="bar"><div class="affectionFill" id="affectionFill"></div></div>

    <!-- MENU -->
    <div id="menuUI" class="menu">
      <div>▶ 餵食</div>
      <div>玩耍</div>
      <div>哄睡</div>
    </div>

  </div>

  <div class="buttons">
    <button class="btn" onclick="leftBtn()">◀</button>
    <button class="btn btn-center" onclick="middleBtn()">❤</button>
    <button class="btn" onclick="rightBtn()">▶</button>
  </div>

</div>

<script>

let hunger = 0;
let hp = 100;
let affection = 0;

let exp = 0;
let level = 1;

let menu = false;

let sleepUntil = 0;
let lastFeed = Date.now();

/* =========================
   功能
========================= */

function feed(){
  hunger = Math.max(0, hunger - 25);
  hp = Math.min(100, hp + 10);
  lastFeed = Date.now();
}

function play(){
  affection = Math.min(100, affection + 8);
  exp += 5;
}

function sleep(){
  sleepUntil = Date.now() + 12 * 60 * 60 * 1000;
}

function isSleep(){
  return Date.now() < sleepUntil;
}

/* 等級 */
function expToNext(lv){
  return Math.floor(20 + Math.pow(lv,1.6)*10);
}

function levelUp(){
  while(level < 99 && exp >= expToNext(level)){
    exp -= expToNext(level);
    level++;
  }
}

/* =========================
   按鍵
========================= */

function leftBtn(){
  if(menu){
    menu = false;
    document.getElementById("menuUI").classList.remove("active");
  }else{
    exp += 2;
  }
}

function rightBtn(){
  menu = !menu;
  document.getElementById("menuUI").classList.toggle("active");
}

function middleBtn(){
  if(!menu){
    feed();
    return;
  }
}

/* =========================
   主循環
========================= */

setInterval(()=>{

let sleepLock = isSleep();

if(!sleepLock){
  hunger += 1;
  hp -= hunger > 80 ? 0.4 : -0.2;
  hp = Math.max(0,Math.min(100,hp));
}

levelUp();

/* UI */
document.getElementById("level").textContent = "LV " + level;

document.getElementById("hpFill").style.width = hp + "%";
document.getElementById("hungerFill").style.width = hunger + "%";
document.getElementById("affectionFill").style.width = affection + "%";

document.getElementById("emotion").textContent =
affection > 60 ? "心情：很開心" :
hunger > 70 ? "心情：難過" : "心情：普通";

document.getElementById("battery").textContent =
Math.max(0,100-Math.min(100,hunger)) + "%";

document.getElementById("memory").textContent =
"上次餵食：" + Math.floor((Date.now()-lastFeed)/1000) + "秒前";

if(sleepLock){
  document.getElementById("pet").textContent = "꒰ᵕ༚ᵕ꒱ zZ";
}else{
  document.getElementById("pet").textContent = "꒰ ´꒳`∗ ꒱";
}

},2000);

</script>

</body>
</html>
