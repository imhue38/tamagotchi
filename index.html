<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi v16.9.2</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  /* 🧼 已改成完全透明背景（你不用動CSS） */
  background:transparent;

  overflow:hidden;
  font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
}

/* 🧸 機身 */
#tama{
  width:280px;
  height:390px;
  background:linear-gradient(145deg,#fff0f7,#dff3ff 60%,#ffffff);
  border-radius:65% 65% 60% 60%;
  padding:16px;
  box-sizing:border-box;
  position:relative;

  box-shadow:
    0 18px 35px rgba(0,0,0,.18),
    inset -6px -6px 12px rgba(255,255,255,.9),
    inset 6px 6px 12px rgba(150,170,200,.2);
}

/* 📺 LCD */
.screen{
  width:74%;
  height:145px;
  margin:60px auto 0;
  background:linear-gradient(145deg,#fff,#f7fbff);
  border-radius:14px;
  position:relative;
  padding:6px;
  text-align:center;
  box-shadow:
    inset 4px 4px 10px rgba(0,0,0,.15),
    inset -3px -3px 8px rgba(255,255,255,.9);
}

/* 🔋 */
#battery{
  position:absolute;
  top:6px;
  right:8px;
  font-size:8px;
  font-weight:900;
  color:#87c1f5;
}

/* 📈 LV */
#level{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

/* 🧬 */
#personality{
  position:absolute;
  top:6px;
  left:8px;
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

/* 🐣 */
.pet{
  font-size:26px;
  font-weight:900;
  color:#baa3d6;
  margin-top:42px;
}

/* 😌 */
#mood{
  font-size:12px;
  color:#87c1f5;
  margin-top:6px;
}

/* 📊 血條 */
.left-bars{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
}

.bar{
  height:4px;
  margin:3px 0;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.hp{background:#9dedba;height:100%;}
.satiety{background:#f0c895;height:100%;}
.affection{background:#ffb3da;height:100%;}

/* 📋 選單 */
#menu{
  display:none;
  position:absolute;
  top:38px;
  left:6px;
  right:6px;
  font-size:9px;
  font-weight:900;
  color:#87c1f5;
  text-align:left;
  line-height:1.4;
  padding:4px;
  background:rgba(255,255,255,0.35);
  border-radius:6px;
}

.menu-item{padding:1px 0;}
.active{color:#ff8fc2;}

/* 🎮 按鍵 */
.buttons{
  margin-top:55px;
  display:flex;
  justify-content:center;
  gap:18px;
}

button{
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#ffffff,#e9eef7);
  box-shadow:
    0 6px 0 rgba(0,0,0,.25),
    inset -3px -3px 6px rgba(255,255,255,.9),
    inset 3px 3px 6px rgba(150,160,180,.25);
  font-weight:900;
  font-size:16px;
}

button:active{
  transform:translateY(3px);
}
</style>
</head>

<body>

<div id="tama">

<div class="screen">

<div id="battery">100%</div>
<div id="level">LV 1</div>

<div id="personality">中性</div>

<div class="pet" id="pet">꒰ ´꒳`∗ ꒱</div>
<div id="mood">正常</div>

<div id="menu"></div>

<div class="left-bars">
  <div class="bar"><div class="hp" id="hp"></div></div>
  <div class="bar"><div class="satiety" id="satiety"></div></div>
  <div class="bar"><div class="affection" id="affection"></div></div>
</div>

</div>

<div class="buttons">
<button onclick="left()">◀</button>
<button onclick="ok()">❤</button>
<button onclick="right()">▶</button>
</div>

</div>

<script>

/* 🧠 完整系統保留 */
let menuState="main";
let index=0;

let hp=100;
let satiety=100;
let affection=0;
let level=1;

const mainMenu=["餵食","玩耍","返回"];
const feedMenu=["蘋果","餅乾","隨機","返回"];
const playMenu=["丟球","玩具","隨機","返回"];

let prefer="apple";

/* 🎮 控制 */
function right(){
if(menuState==="main"){
menuState="mainMenu";
index=0;
showMenu();
return;
}
index++;
wrap();
showMenu();
}

function left(){
if(menuState!=="main"){
index--;
wrap();
showMenu();
}
}

function ok(){

if(menuState==="mainMenu"){
const c=mainMenu[index];

if(c==="餵食"){menuState="feed";index=0;}
if(c==="玩耍"){menuState="play";index=0;}
if(c==="返回"){menuState="main";}

showMenu();
return;
}

/* 🍎 */
if(menuState==="feed"){
const item=feedMenu[index];

if(item==="蘋果"){
satiety+=prefer==="apple"?25:10;
affection+=5;
}
if(item==="餅乾"){
satiety+=15;
}
if(item==="隨機"){
const r=Math.random();
if(r<0.25){satiety-=10;affection-=5;}
else if(r<0.7){satiety+=10;}
else{satiety+=30;affection+=10;}
}

menuState="main";
showMenu();
return;
}

/* 🎮 */
if(menuState==="play"){
const item=playMenu[index];

if(item==="丟球"){
affection+=10;
prefer="toy";
}
if(item==="玩具"){
affection+=15;
prefer="toy";
}
if(item==="隨機"){
const r=Math.random();
if(r<0.25){affection-=10;}
else if(r<0.7){affection+=10;}
else{affection+=30;satiety+=5;}
}

menuState="main";
showMenu();
return;
}

}

/* 📋 */
function showMenu(){

let list=[];
if(menuState==="mainMenu")list=mainMenu;
if(menuState==="feed")list=feedMenu;
if(menuState==="play")list=playMenu;

let html="";
list.forEach((item,i)=>{
html+=`<div class="menu-item ${i===index?'active':''}">
${i===index?'▶ ':''}${item}
</div>`;
});

document.getElementById("menu").style.display=
menuState==="main"?"none":"block";

document.getElementById("menu").innerHTML=html;

}

function wrap(){
let len=0;
if(menuState==="mainMenu")len=mainMenu.length;
if(menuState==="feed")len=feedMenu.length;
if(menuState==="play")len=playMenu.length;

if(index<0)index=len-1;
if(index>=len)index=0;
}

/* 🔄 */
setInterval(()=>{

satiety-=0.4;
hp-=satiety<25?0.3:0.1;

satiety=Math.max(0,Math.min(100,satiety));
hp=Math.max(0,Math.min(100,hp));
affection=Math.max(0,Math.min(100,affection));

document.getElementById("hp").style.width=hp+"%";
document.getElementById("satiety").style.width=satiety+"%";
document.getElementById("affection").style.width=affection+"%";

document.getElementById("battery").textContent=Math.floor(satiety)+"%";
document.getElementById("level").textContent="LV "+level;

document.getElementById("mood").textContent=
satiety<20?"不開心":"正常";

document.getElementById("personality").textContent=
prefer==="apple"?"愛吃水果":"愛玩具";

document.getElementById("pet").textContent=
satiety<20?"꒰ ˊ^ˋ ꒱":"꒰ ´꒳`∗ ꒱";

},1000);

</script>

</body>
</html>
