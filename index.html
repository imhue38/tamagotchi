<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi v4 Fixed</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
  background:transparent;
}

#tama{
  width:190px;
  height:250px;
  background:linear-gradient(145deg,#ffe3f6,#e6f6ff);
  border-radius:58% 58% 52% 52%;
  padding:14px;
  transform:scale(0.85);
  box-shadow:0 10px 20px rgba(0,0,0,.12);
  position:relative;
}

/* 📺 LCD */
.screen{
  width:62%;
  height:118px;
  margin:24px auto 0;
  padding:10px;
  background:linear-gradient(145deg,#ffffff,#f7fbff);
  border-radius:10px;
  text-align:center;
  box-shadow:
    inset 5px 5px 10px rgba(0,0,0,.14),
    inset -3px -3px 8px rgba(255,255,255,.9),
    0 0 0 2px rgba(190,200,230,.25);
  position:relative;
  overflow:hidden;
}

/* 高光 */
.screen::before{
  content:"";
  position:absolute;
  top:-35%;
  left:-30%;
  width:170%;
  height:70%;
  background:linear-gradient(120deg,rgba(255,255,255,.65),rgba(255,255,255,0));
  transform:rotate(-12deg);
  pointer-events:none;
}

/* 像素 */
.screen::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(180,200,255,.06) 0px,
    rgba(180,200,255,.06) 1px,
    rgba(255,255,255,0) 2px,
    rgba(255,255,255,0) 3px
  );
  pointer-events:none;
}

/* 📌 文字 */
.level,
.status,
#emotion{
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

/* 🔋 電量 */
#battery{
  position:absolute;
  top:6px;
  right:8px;
  font-size:8px;
  font-weight:900;
  color:#87c1f5;
}

/* 🐣 寵物 */
.pet{
  font-size:22px;
  font-weight:900;
  color:#baa3d6;
  margin:6px 0;
}

.bar{
  height:5px;
  background:#e8ecff;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#b8d2ff;
}

/* 🎮 按鍵 */
.buttons{
  position:absolute;
  top:178px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
}

.btn{
  width:28px;
  height:28px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#ffe3f6,#e6f6ff);
  box-shadow:0 4px 0 rgba(0,0,0,.15);
  font-weight:900;
  cursor:pointer;
}

.btn-center{
  width:34px;
  height:34px;
}
</style>
</head>

<body>

<div id="tama">

  <div class="screen">

    <div id="battery">100%</div>

    <div class="level" id="level">LV 1</div>

    <div class="pet" id="pet">꒰ ´꒳`∗ ꒱</div>

    <div id="emotion">心情：普通</div>

    <div class="status" id="status">正常</div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

  </div>

  <!-- 🎮 已修正：中鍵是 ❤ -->
  <div class="buttons">
    <button class="btn" onclick="poke()">◀</button>
    <button class="btn btn-center" onclick="feed()">❤</button>
    <button class="btn" onclick="next()">▶</button>
  </div>

</div>

<script>

let hunger = 0;
let exp = 0;
let level = 1;
let sleep = false;

function feed(){
  hunger = Math.max(0, hunger - 30);
  exp += 10;

  document.getElementById("pet").textContent = "‘٩꒰｡•◡•｡꒱۶’";
  setTimeout(()=>document.getElementById("pet").textContent="꒰ ´꒳`∗ ꒱",500);
}

function poke(){
  document.getElementById("pet").textContent = "꒰ ◔_◔ ꒱";
  setTimeout(()=>document.getElementById("pet").textContent="꒰ ´꒳`∗ ꒱",500);
}

function next(){
  exp += 5;
}

/* 🐣 進化 */
function getPet(){
  if(level >= 10) return "✧꒰◍•ᴗ•◍꒱✧";
  if(level >= 5) return "꒰•̀ᴗ•́꒱";
  return "꒰ ´꒳`∗ ꒱";
}

/* 💤 睡眠 */
function checkSleep(){
  sleep = hunger > 90;
}

/* 🧠 等級 */
function updateLevel(){
  if(exp > 50) level = 5;
  if(exp > 120) level = 10;
}

setInterval(()=>{

hunger++;
exp += 0.3;

updateLevel();
checkSleep();

document.getElementById("pet").textContent =
sleep ? "꒰ᵕ༚ᵕ꒱ zZ" : getPet();

document.getElementById("level").textContent = "LV " + level;

document.getElementById("fill").style.width =
Math.min(100,hunger) + "%";

document.getElementById("status").textContent =
sleep ? "睡覺中" : (hunger > 70 ? "餓了" : "正常");

document.getElementById("emotion").textContent =
sleep ? "心情：睡眠" : (hunger > 70 ? "心情：難過" : "心情：普通");

document.getElementById("battery").textContent =
Math.max(0, 100 - Math.min(100,hunger)) + "%";

},2000);

</script>

</body>
</html>
