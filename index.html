<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi v7 Safe Paste</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
  background:transparent;
  user-select:none;
}

#tama{
  width:190px;
  height:250px;
  background:linear-gradient(145deg,#ffe3f6,#e6f6ff);
  border-radius:58% 58% 52% 52%;
  padding:14px;
  transform:scale(0.85);
  box-shadow:0 10px 20px rgba(0,0,0,.12);
  position:relative;
}

/* LCD */
.screen{
  width:62%;
  height:118px;
  margin:24px auto 0;
  padding:10px;
  background:linear-gradient(145deg,#ffffff,#f7fbff);
  border-radius:10px;
  text-align:center;
  box-shadow:
    inset 5px 5px 10px rgba(0,0,0,.14),
    inset -3px -3px 8px rgba(255,255,255,.9),
    0 0 0 2px rgba(190,200,230,.25);
  position:relative;
  overflow:hidden;
}

/* UI */
.level,
#emotion,
#memory,
#menuUI{
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

/* йӣ»йҮҸ */
#battery{
  position:absolute;
  top:6px;
  right:8px;
  font-size:8px;
  font-weight:900;
  color:#87c1f5;
}

/* еҜөзү© */
.pet{
  font-size:22px;
  font-weight:900;
  color:#baa3d6;
  margin:6px 0;
}

/* иЎҖжўқ */
.bar{
  height:5px;
  width:85%;
  margin:4px auto;
  background:#ffe5ef;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#f0c895;
}

/* йҒёе–® */
.menu{
  display:none;
  font-size:10px;
  font-weight:900;
  color:#87c1f5;
}

.menu.active{
  display:block;
}

/* жҢүйҚө */
.buttons{
  position:absolute;
  top:178px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
}

.btn{
  width:28px;
  height:28px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#ffe3f6,#e6f6ff);
  font-weight:900;
  cursor:pointer;
}

.btn-center{
  width:34px;
  height:34px;
}
</style>
</head>

<body>

<div id="tama">

  <div class="screen">

    <div id="battery">100%</div>

    <div class="level" id="level">LV 1</div>

    <div class="pet" id="pet">к’° Вҙк’і`вҲ— к’ұ</div>

    <div id="memory">еүӣеҮәз”ҹ</div>

    <div id="emotion">еҝғжғ…пјҡжҷ®йҖҡ</div>

    <div class="bar"><div class="fill" id="fill"></div></div>

    <!-- рҹ“Ӣ MENU -->
    <div id="menuUI" class="menu">
      <div id="menuText">в–¶ йӨөйЈҹ</div>
      <div>зҺ©иҖҚ</div>
      <div>е“„зқЎ</div>
    </div>

  </div>

  <div class="buttons">
    <button class="btn" onclick="leftBtn()">в—Җ</button>
    <button class="btn btn-center" onclick="middleBtn()">вқӨ</button>
    <button class="btn" onclick="rightBtn()">в–¶</button>
  </div>

</div>

<script>

/* =========================
   рҹҺҜ v7 е®Ңж•ҙзі»зөұпјҲе·Іж•ҙеҗҲпјү
   ========================= */

let hunger = 0;
let hp = 100;
let exp = 0;
let level = 1;
let affection = 0;

let menu = false;
let menuIndex = 0;

/* рҹҳҙ е“„зқЎжҷӮй–“ */
let sleepUntil = 0;

/* рҹҚҪ йӨөйЈҹжҷӮй–“ */
let lastFeed = Date.now();

/* -------------------------
   ж ёеҝғеҠҹиғҪ
--------------------------*/

function feed(){
  hunger = Math.max(0, hunger - 25);
  hp = Math.min(100, hp + 10);
  lastFeed = Date.now();
}

function play(){
  affection += 5;
  exp += 5;
}

/* рҹҳҙ 12е°ҸжҷӮе“„зқЎ */
function sleep(){
  sleepUntil = Date.now() + 12 * 60 * 60 * 1000;
}

/* рҹ’Ө жҳҜеҗҰзқЎзң  */
function isSleep(){
  return Date.now() < sleepUntil;
}

/* -------------------------
   зӯүзҙҡзі»зөұ
--------------------------*/

function expToNext(lv){
  return Math.floor(20 + Math.pow(lv,1.6)*10);
}

function levelUp(){
  while(level < 99 && exp >= expToNext(level)){
    exp -= expToNext(level);
    level++;
  }
}

/* -------------------------
   жҢүйҚөпјҲдҪ иҰҒжұӮзҡ„йӮҸијҜпјү
--------------------------*/

function leftBtn(){
  if(menu){
    menu = false;
    document.getElementById("menuUI").classList.remove("active");
  }else{
    exp += 2;
  }
}

function rightBtn(){
  menu = !menu;
  document.getElementById("menuUI").classList.toggle("active");
}

function middleBtn(){

  if(!menu){
    feed();
    return;
  }

  if(menuIndex === 0) feed();
  if(menuIndex === 1) play();
  if(menuIndex === 2) sleep();
}

/* -------------------------
   дё»еҫӘз’°
--------------------------*/

setInterval(()=>{

let sleepLock = isSleep();

/* рҹ’Ө е“„зқЎдҝқиӯ· */
if(!sleepLock){
  hunger += 1;
  hp -= hunger > 80 ? 0.4 : -0.2;
  hp = Math.max(0,Math.min(100,hp));
}

levelUp();

/* UI */
document.getElementById("level").textContent = "LV " + level;

document.getElementById("fill").style.width =
Math.min(100,hunger) + "%";

document.getElementById("emotion").textContent =
affection > 20 ? "еҝғжғ…пјҡй–Ӣеҝғ" : (hunger > 70 ? "еҝғжғ…пјҡйӣЈйҒҺ" : "еҝғжғ…пјҡжҷ®йҖҡ");

document.getElementById("battery").textContent =
Math.max(0,100-Math.min(100,hunger)) + "%";

document.getElementById("memory").textContent =
"дёҠж¬ЎйӨөйЈҹпјҡ" + Math.floor((Date.now()-lastFeed)/1000) + "з§’еүҚ";

/* рҹ’Ө зӢҖж…ӢйЎҜзӨә */
if(sleepLock){
  document.getElementById("pet").textContent = "к’°бө•ајҡбө•к’ұ zZ";
  document.getElementById("memory").textContent = "е“„зқЎдҝқиӯ·дёӯ";
}else{
  document.getElementById("pet").textContent = "к’° Вҙк’і`вҲ— к’ұ";
}

},2000);

</script>

</body>
</html>
